    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/state-of-ai-aec/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <meta name="theme-color" content="#f7faf8" />
    <script>
      // Flash-free theme: aplica el tema guardado antes del primer paint.
      // Presentación: claro por defecto (escala de grises + verde).
      (function () {
        try {
          var t = localStorage.getItem('soa-theme-v2');
          if (t !== 'dark' && t !== 'light') t = 'light';
          document.documentElement.dataset.theme = t;
        } catch (e) {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
